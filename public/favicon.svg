<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="knGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" /> <!-- Tailwind orange-500 -->
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" /> <!-- Tailwind orange-700 -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#knGrad)" filter="url(#shadow)" />
  <text x="50" y="54" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="44" letter-spacing="-1" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">KN</text>
</svg>